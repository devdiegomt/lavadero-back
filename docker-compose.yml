# =============================================================================
# Carwash SaaS — Docker Compose
# Arquitectura WhatsApp AI: Baileys + n8n + Claude
#
# Servicios:
#   postgres  :5433  — Base de datos principal (5433 para evitar conflicto con Postgres local)
#   redis     :6379  — Cache / sesiones
#   backend   :3000  — Express API
#   bot-wa    :3001  — Bot Baileys (WhatsApp)
#   n8n       :5678  — Orquestador de flujos AI
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # PostgreSQL
  # Puerto host 5433 para evitar conflicto con instalaciones locales de Postgres
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-carwash_dev}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-carwash_dev}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Redis
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Backend Express API
  # Dentro de Docker la red interna usa el puerto 5432 (sin conflicto)
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-carwash_dev}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_EXPIRES: ${JWT_ACCESS_EXPIRES:-15m}
      JWT_REFRESH_EXPIRES: ${JWT_REFRESH_EXPIRES:-7d}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-900000}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-100}
      N8N_API_KEY: ${N8N_API_KEY}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ---------------------------------------------------------------------------
  # Bot WhatsApp (Baileys)
  # Proceso separado: mantiene WebSocket persistente con WhatsApp.
  # Escanear QR: docker compose logs -f bot-wa
  # ---------------------------------------------------------------------------
  bot-wa:
    build:
      context: ./bot-wa
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3001
      TENANT_PHONE: ${TENANT_PHONE}
      N8N_WEBHOOK_URL: http://n8n:5678/webhook/whatsapp
      N8N_AUTH_TOKEN: ${N8N_AUTH_TOKEN:-}
      AUTH_DIR: /app/auth
      RECONNECT_INTERVAL_MS: ${RECONNECT_INTERVAL_MS:-5000}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "3001:3001"
    volumes:
      - bot_auth:/app/auth
    depends_on:
      - n8n
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ---------------------------------------------------------------------------
  # n8n — Orquestador de flujos
  # UI: http://localhost:5678
  # Workflow: importar n8n/workflows/whatsapp-main.json
  # ---------------------------------------------------------------------------
  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    environment:
      N8N_HOST: ${N8N_HOST:-localhost}
      N8N_PORT: 5678
      N8N_PROTOCOL: ${N8N_PROTOCOL:-http}
      WEBHOOK_URL: ${N8N_WEBHOOK_URL_PUBLIC:-http://localhost:5678/}
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD:-carwash2024!}
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${N8N_DB:-n8n}
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-postgres}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      BACKEND_URL: http://backend:3000
      N8N_API_KEY: ${N8N_API_KEY}
      EXECUTIONS_DATA_PRUNE: "true"
      EXECUTIONS_DATA_MAX_AGE: 336
      GENERIC_TIMEZONE: ${TIMEZONE:-America/Bogota}
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:5678/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

# =============================================================================
# Volúmenes persistentes
# =============================================================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  bot_auth:
    driver: local
  n8n_data:
    driver: local
